AWSTemplateFormatVersion: '2010-09-09'
Description: Root orchestration template for Pet Store - deploys all nested stacks

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
  DockerImageUri:
    Type: String
  TemplatesBucketUrl:
    Type: String

Resources:
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/vpc.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-vpc-stack
        - Key: auto-delete
          Value: "no"
        - Key: auto-stop
          Value: "no"

  DatabaseStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/database.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-database-stack
        - Key: auto-delete
          Value: "no"
        - Key: auto-stop
          Value: "no"

  FrontendStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/frontend.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-frontend-stack
        - Key: auto-delete
          Value: "no"
        - Key: auto-stop
          Value: "no"

  BackendStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - VPCStack
      - DatabaseStack
    Properties:
      TemplateURL: !Sub ${TemplatesBucketUrl}/backend.yaml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        DockerImageUri: !Ref DockerImageUri
        VPCId: !GetAtt VPCStack.Outputs.VPCId
        PublicSubnet1Id: !GetAtt VPCStack.Outputs.PublicSubnet1Id
        PublicSubnet2Id: !GetAtt VPCStack.Outputs.PublicSubnet2Id
        PrivateSubnet1Id: !GetAtt VPCStack.Outputs.PrivateSubnet1Id
        PrivateSubnet2Id: !GetAtt VPCStack.Outputs.PrivateSubnet2Id
        ALBSecurityGroupId: !GetAtt VPCStack.Outputs.ALBSecurityGroupId
        ECSSecurityGroupId: !GetAtt VPCStack.Outputs.ECSSecurityGroupId
        PetsTableName: !GetAtt DatabaseStack.Outputs.PetsTableName
        PetsTableArn: !GetAtt DatabaseStack.Outputs.PetsTableArn
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-backend-stack
        - Key: auto-delete
          Value: "no"
        - Key: auto-stop
          Value: "no"

Outputs:
  ALBDnsName:
    Description: Application Load Balancer DNS name
    Value: !GetAtt BackendStack.Outputs.ALBDnsName
  CloudFrontDistributionUrl:
    Description: CloudFront distribution URL for the frontend
    Value: !GetAtt FrontendStack.Outputs.CloudFrontDistributionUrl
  FrontendBucketName:
    Description: S3 bucket name for frontend assets
    Value: !GetAtt FrontendStack.Outputs.FrontendBucketName
  PetsTableName:
    Description: DynamoDB Pets table name
    Value: !GetAtt DatabaseStack.Outputs.PetsTableName
  ECSClusterName:
    Description: ECS Cluster name
    Value: !GetAtt BackendStack.Outputs.ECSClusterName
  FargateServiceName:
    Description: ECS Fargate Service name
    Value: !GetAtt BackendStack.Outputs.FargateServiceName
