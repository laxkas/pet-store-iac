AWSTemplateFormatVersion: '2010-09-09'
Description: Backend template for Pet Store - ECS Fargate service behind ALB with IAM roles
# comment

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
  DockerImageUri:
    Type: String
  VPCId:
    Type: AWS::EC2::VPC::Id
  PublicSubnet1Id:
    Type: AWS::EC2::Subnet::Id
  PublicSubnet2Id:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
  ALBSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  ECSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  PetsTableName:
    Type: String
  PetsTableArn:
    Type: String
  SplunkHecUrl:
    Type: String
    Default: 'https://3.95.251.132:8088/services/collector'
    Description: Splunk HEC collector URL reachable from the ECS tasks (via NAT egress). Empty disables shipping.
  SplunkHecToken:
    Type: String
    Default: '11111111-1111-1111-1111-111111111111'
    NoEcho: true
    Description: Splunk HEC token (demo default; use Secrets Manager for real workloads).
  SplunkIndex:
    Type: String
    Default: main
  SplunkSourcetype:
    Type: String
    Default: pet-store

Resources:
  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${EnvironmentName}-pet-store-backend
      RetentionInDays: 30
      Tags:
        - Key: auto-delete
          Value: "no"
        - Key: auto-stop
          Value: "no"

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${EnvironmentName}-pet-store-cluster
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-pet-store-cluster
        - Key: auto-delete
          Value: "no"
        - Key: auto-stop
          Value: "no"

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-pet-store-task-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-pet-store-task-execution-role
        - Key: auto-delete
          Value: "no"
        - Key: auto-stop
          Value: "no"

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-pet-store-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${EnvironmentName}-pet-store-dynamodb-access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:BatchWriteItem
                  - dynamodb:Query
                Resource:
                  - !Ref PetsTableArn
                  - !Sub '${PetsTableArn}/index/*'
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-pet-store-task-role
        - Key: auto-delete
          Value: "no"
        - Key: auto-stop
          Value: "no"

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${EnvironmentName}-pet-store-backend
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: !Sub ${EnvironmentName}-pet-store-backend
          Image: !Ref DockerImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: TABLE_NAME
              Value: !Ref PetsTableName
            - Name: SERVICE_NAME
              Value: pet-store-backend
            - Name: SPLUNK_HEC_URL
              Value: !Ref SplunkHecUrl
            - Name: SPLUNK_HEC_TOKEN
              Value: !Ref SplunkHecToken
            - Name: SPLUNK_INDEX
              Value: !Ref SplunkIndex
            - Name: SPLUNK_SOURCETYPE
              Value: !Ref SplunkSourcetype
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BackendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-pet-store-backend-task
        - Key: auto-delete
          Value: "no"
        - Key: auto-stop
          Value: "no"

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${EnvironmentName}-pet-store-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id
      SecurityGroups:
        - !Ref ALBSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-pet-store-alb
        - Key: auto-delete
          Value: "no"
        - Key: auto-stop
          Value: "no"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-pet-store-tg
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VPCId
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-pet-store-tg
        - Key: auto-delete
          Value: "no"
        - Key: auto-stop
          Value: "no"

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  FargateService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: !Sub ${EnvironmentName}-pet-store-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1Id
            - !Ref PrivateSubnet2Id
          SecurityGroups:
            - !Ref ECSSecurityGroupId
      LoadBalancers:
        - ContainerName: !Sub ${EnvironmentName}-pet-store-backend
          ContainerPort: 3000
          TargetGroupArn: !Ref TargetGroup
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-pet-store-service
        - Key: auto-delete
          Value: "no"
        - Key: auto-stop
          Value: "no"

Outputs:
  ALBDnsName:
    Description: Application Load Balancer DNS name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub ${EnvironmentName}-ALBDnsName
  ECSClusterName:
    Description: ECS Cluster name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub ${EnvironmentName}-ECSClusterName
  FargateServiceName:
    Description: ECS Fargate Service name
    Value: !GetAtt FargateService.Name
    Export:
      Name: !Sub ${EnvironmentName}-FargateServiceName
